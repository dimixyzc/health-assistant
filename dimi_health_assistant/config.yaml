url: "https://github.com/dimixyzc/health-assistant"
startup: application
init: false
map:
  - data:rw
  - share:rw
arch:
  - amd64
options:
  telegram_bot_token: ""
  telegram_chat_id: ""
  garmin_email: ""
  garmin_password: ""
  renpho_email: ""
  renpho_password: ""
